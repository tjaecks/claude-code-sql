    }

      padding: 0 32px 24px;
      color: #fff;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('https://www.matterhornparadise.ch/ZBAG/10-region/landschaft-matterhorn/matterhorn/2235/image-thumb__2235__content-hero/Herbst%20Quer%2002.jpg') center/cover no-repeat;

      z-index: 0;
    }
    header h1, header p { position: relative; z-index: 1; }
    header h1 { font-size: 28px; font-weight: 700; letter-spacing: 0.4px; text-shadow: 0 1px 6px rgba(0,0,0,0.6); }
    header p  { font-size: 13px; color: #cde; margin-top: 6px; text-shadow: 0 1px 4px rgba(0,0,0,0.5); }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      flex-wrap: wrap;
    }

    .toolbar input[type="text"] {
      flex: 1;
      min-width: 200px;
      max-width: 380px;
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      outline: none;
    }
    .toolbar input[type="text"]:focus { border-color: #1c2b3a; }

    .toolbar button {
      padding: 6px 14px;
      background: #1c2b3a;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }
    .toolbar button:hover { background: #2d4459; }
    .toolbar button.reset {
      background: transparent;
      color: #666;
      border: 1px solid #ccc;
    }
    .toolbar button.reset:hover { background: #f0f0f0; color: #333; }

    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filters select {
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 12px;
      background: #fff;
      outline: none;
      cursor: pointer;
    }
    .filters select:focus { border-color: #1c2b3a; }
    .filters label { font-size: 12px; color: #666; }

    .count {
      margin-left: auto;
      font-size: 12px;
      color: #888;
      white-space: nowrap;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
    }

    thead tr {
      background: #1c2b3a;
      color: #fff;
    }

    th {
      padding: 9px 10px;
      text-align: left;
      font-weight: 500;
      font-size: 12px;
      white-space: nowrap;
      user-select: none;
      cursor: pointer;
      position: relative;
    }
    th:hover { background: #2d4459; }
    th .sort-icon { margin-left: 4px; opacity: 0.4; font-size: 10px; }
    th.asc  .sort-icon { opacity: 1; }
    th.desc .sort-icon { opacity: 1; }

    td {
      padding: 7px 10px;
      border-bottom: 1px solid #ebebeb;
      white-space: nowrap;
    }

    tr:hover td { background: #f0f5fa; }
    tr:nth-child(even) td { background: #fafafa; }
    tr:nth-child(even):hover td { background: #f0f5fa; }

    td.num { text-align: right; font-variant-numeric: tabular-nums; }

    .badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 500;
    }

    .badge-be  { background: #fff0cc; color: #7a5500; }
    .badge-gr  { background: #e8ffe8; color: #1a6b1a; }
    .badge-it  { background: #ffe8e8; color: #8a1a1a; }

    .no-results {
      text-align: center;
      padding: 40px;
      color: #999;
      font-size: 14px;
    }
  </style>
</head>
<body>

<header>
  <h1>Swiss 4000m Peaks</h1>

<div class="toolbar">
  <input type="text" id="searchInput" placeholder="Search peaks, massif, canton…" />
  <button onclick="applySearch()">Search</button>
  <button class="reset" onclick="resetAll()">Reset</button>

  <div class="filters">
    <label>Range</label>
    <select id="filterRange" onchange="applySearch()">
      <option value="">All ranges</option>
      <option>Pennine Alps</option>
      <option>Bernese Alps</option>
      <option>Rhaetian Alps</option>
    </select>

    <label>Massif</label>
    <select id="filterMassif" onchange="applySearch()">
      <option value="">All massifs</option>
    </select>

    <label>Canton</label>
    <select id="filterCanton" onchange="applySearch()">
      <option value="">All cantons</option>
      <option value="VS">VS (Valais)</option>
      <option value="BE">BE (Bern)</option>
      <option value="GR">GR (Graubünden)</option>
      <option value="IT">IT (border Italy)</option>
    </select>

    <label>Min elev. (m)</label>
    <select id="filterElev" onchange="applySearch()">
      <option value="0">≥ 4000</option>
      <option value="4100">≥ 4100</option>
      <option value="4200">≥ 4200</option>
      <option value="4300">≥ 4300</option>
      <option value="4400">≥ 4400</option>
      <option value="4500">≥ 4500</option>

  </div>

  <span class="count" id="rowCount"></span>
</div>

</div>

// Populate massif dropdown
const massifs = [...new Set(PEAKS.map(p => p.massif))].sort();
const massifSel = document.getElementById('filterMassif');
massifs.forEach(m => {
  const o = document.createElement('option');
  o.value = m; o.textContent = m;
  massifSel.appendChild(o);
});

let currentData = [...PEAKS];
let sortCol = null;
let sortDir = 1;

function cantonBadge(c) {
  const cls = c.includes('BE') ? 'badge-be' : c.includes('GR') ? 'badge-gr' : c.startsWith('IT') ? 'badge-it' : 'badge-vs';
  return `<span class="badge ${cls}">${c}</span>`;
}

function render(data) {
  const tbody = document.getElementById('tableBody');
  const noRes = document.getElementById('noResults');
  document.getElementById('rowCount').textContent = `${data.length} of ${PEAKS.length} peaks`;

  if (!data.length) {
    tbody.innerHTML = '';
    noRes.style.display = 'block';
    return;
  }
  noRes.style.display = 'none';

  tbody.innerHTML = data.map(p => `
    <tr>
      <td class="num">${p.id}</td>
      <td><strong>${p.name}</strong></td>
      <td>${p.name_local || '—'}</td>
      <td>${p.massif}</td>
      <td>${p.range}</td>
      <td class="num">${p.elevation_m.toLocaleString()}</td>
      <td class="num">${p.latitude.toFixed(6)}</td>
      <td class="num">${p.longitude.toFixed(6)}</td>
      <td class="num">${p.prominence_m != null ? p.prominence_m.toLocaleString() : '—'}</td>
      <td class="num">${p.isolation_km != null ? p.isolation_km : '—'}</td>
      <td>${p.first_ascent_date || '—'}</td>
      <td>${p.first_ascent_party || '—'}</td>
      <td>${cantonBadge(p.cantons)}</td>
      <td class="num">${p.uiaa_rank}</td>
      <td class="num">${p.dist_richterswil_km}</td>
      <td><a href="map.html?name=${encodeURIComponent(p.name)}&lat=${p.latitude}&lon=${p.longitude}&elev=${p.elevation_m}&dist=${p.dist_richterswil_km}" target="_blank" style="color:#1c2b3a;font-weight:500;text-decoration:none;border:1px solid #1c2b3a;border-radius:3px;padding:2px 8px;font-size:12px;white-space:nowrap;">🗺 Map</a></td>
    </tr>`).join('');
}

function applySearch() {
  const q     = document.getElementById('searchInput').value.toLowerCase().trim();
  const range = document.getElementById('filterRange').value;
  const massif= document.getElementById('filterMassif').value;
  const canton= document.getElementById('filterCanton').value;
  const elev  = parseInt(document.getElementById('filterElev').value) || 0;

  let data = PEAKS.filter(p => {
    if (elev  && p.elevation_m < elev) return false;
    if (range && p.range !== range) return false;
    if (massif && p.massif !== massif) return false;
    if (canton && !p.cantons.includes(canton)) return false;
    if (q) {
      const hay = [p.name, p.name_local, p.massif, p.range, p.cantons,
                   p.first_ascent_date, p.first_ascent_party, p.elevation_m].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  if (sortCol) {
    data.sort((a, b) => {
      const av = a[sortCol] ?? -Infinity;
      const bv = b[sortCol] ?? -Infinity;
      return av < bv ? -sortDir : av > bv ? sortDir : 0;
    });
  }

  currentData = data;
  render(data);
}

function resetAll() {
  document.getElementById('searchInput').value = '';
  document.getElementById('filterRange').value = '';
  document.getElementById('filterMassif').value = '';
  document.getElementById('filterCanton').value = '';
  document.getElementById('filterElev').value = '0';
  sortCol = null; sortDir = 1;
  document.querySelectorAll('th').forEach(th => th.classList.remove('asc','desc'));
  applySearch();
}

// Sortable headers
document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) sortDir *= -1;
    else { sortCol = col; sortDir = 1; }
    document.querySelectorAll('th').forEach(t => t.classList.remove('asc','desc'));
    th.classList.add(sortDir === 1 ? 'asc' : 'desc');
    applySearch();
  });
});

// Search on Enter
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') applySearch();
});

// Initial render
applySearch();
</script>
