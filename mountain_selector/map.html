<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Summit Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1c2b3a;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 20px;
      background: #1c2b3a;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .back-btn {
      text-decoration: none;
      color: #8fa3b5;
      font-size: 13px;
      border: 1px solid #3a5068;
      border-radius: 4px;
      padding: 5px 10px;
      transition: color 0.15s;
    }
    .back-btn:hover { color: #fff; }

    .info-bar {
      display: flex;
      align-items: baseline;
      gap: 20px;
      flex: 1;
      flex-wrap: wrap;
    }

    .summit-name {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .info-chips {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .chip {
      font-size: 12px;
      background: #2d4459;
      border-radius: 4px;
      padding: 3px 10px;
      color: #cde;
    }
    .chip strong { color: #fff; }
    .chip.drive { background: #1a3a5c; border: 1px solid #2266cc; }

    #map {
      flex: 1;
      width: 100%;
    }

    .legend {
      position: absolute;
      bottom: 28px;
      right: 10px;
      z-index: 1000;
      background: rgba(255,255,255,0.93);
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 12px;
      color: #222;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      line-height: 1.8;
    }
    .legend-dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
    .legend-line {
      display: inline-block;
      width: 18px; height: 3px;
      background: #e03030;
      margin-right: 6px;
      vertical-align: middle;
      border-radius: 2px;
    }
    .legend-line.blue {
      background: #2266cc;
      height: 4px;
    }
  </style>
</head>
<body>

<header>
  <a class="back-btn" href="index.html">← Back</a>
  <div class="info-bar">
    <span class="summit-name" id="summitTitle">—</span>
    <div class="info-chips">
      <span class="chip">Elevation: <strong id="chipElev">—</strong></span>
      <span class="chip">Summit GPS: <strong id="chipGPS">—</strong></span>
      <span class="chip">Distance from Richterswil: <strong id="chipDist">—</strong></span>
      <span class="chip" id="chipTrailhead" style="display:none">Trailhead: <strong id="chipTrailheadName">—</strong></span>
      <span class="chip drive" id="chipDrive" style="display:none">🚗 Drive to trailhead: <strong id="chipDriveVal">—</strong></span>
    </div>
  </div>
</header>

<div id="map"></div>

<script>
  // --- Parse URL params ---
  const params  = new URLSearchParams(location.search);
  const name    = params.get('name')  || 'Summit';
  const lat     = parseFloat(params.get('lat'))  || 46.0;
  const lon     = parseFloat(params.get('lon'))  || 8.0;
  const elev    = params.get('elev')  || '—';
  const dist    = params.get('dist')  || '—';

  // Trailhead (optional)
  const tName   = params.get('tname') || null;
  const tDesc   = params.get('tdesc') || null;
  const tLat    = params.get('tlat')  ? parseFloat(params.get('tlat'))  : null;
  const tLon    = params.get('tlon')  ? parseFloat(params.get('tlon'))  : null;
  const hasTrailhead = tLat !== null && tLon !== null;

  // Driving route (optional)
  const driveKm = params.get('drivekm') ? parseFloat(params.get('drivekm')) : null;
  const driveH  = params.get('driveh')  ? parseFloat(params.get('driveh'))  : null;
  const hasDrive = hasTrailhead && driveKm !== null;

  // Richterswil
  const HOME_LAT  = 47.2050;
  const HOME_LON  = 8.8381;
  const HOME_NAME = 'Richterswil (8805)';

  // --- Fill header info ---
  document.title = name + ' — Summit Map';
  document.getElementById('summitTitle').textContent = name;
  document.getElementById('chipElev').textContent  = elev ? elev + ' m' : '—';
  document.getElementById('chipGPS').textContent   = lat.toFixed(4) + '°N, ' + lon.toFixed(4) + '°E';
  document.getElementById('chipDist').textContent  = dist ? dist + ' km' : '—';
  if (hasTrailhead && tName) {
    document.getElementById('chipTrailhead').style.display = '';
    document.getElementById('chipTrailheadName').textContent = tName;
  }
  if (hasDrive) {
    document.getElementById('chipDrive').style.display = '';
    const hrs = Math.floor(driveH);
    const mins = Math.round((driveH - hrs) * 60);
    const durStr = hrs + 'h ' + (mins > 0 ? mins + 'min' : '');
    document.getElementById('chipDriveVal').textContent = driveKm + ' km · ' + durStr;
  }

  // --- Map centre: midpoint between summit and home ---
  const midLat = (lat + HOME_LAT) / 2;
  const midLon = (lon + HOME_LON) / 2;

  // Zoom: farther apart → lower zoom
  const distNum = parseFloat(dist) || 150;
  const zoom = distNum > 180 ? 7 : distNum > 120 ? 8 : distNum > 80 ? 9 : 10;

  // --- Init Leaflet map ---
  const map = L.map('map').setView([midLat, midLon], zoom);

  // geo.admin.ch Swiss topo WMTS in Web Mercator
  L.tileLayer(
    'https://wmts.geo.admin.ch/1.0.0/ch.swisstopo.pixelkarte-farbe/default/current/3857/{z}/{x}/{y}.jpeg',
    {
      attribution: '© <a href="https://www.swisstopo.admin.ch">swisstopo</a>',
      maxZoom: 18,
      minZoom: 5
    }
  ).addTo(map);

  // --- Custom icons ---
  const summitIcon = L.divIcon({
    className: '',
    html: `<div style="
      width:14px;height:14px;
      background:#e03030;border:2.5px solid #fff;
      border-radius:50%;
      box-shadow:0 0 0 2px #e03030;
    "></div>`,
    iconSize: [14, 14],
    iconAnchor: [7, 7],
    popupAnchor: [0, -10]
  });

  const homeIcon = L.divIcon({
    className: '',
    html: `<div style="
      width:14px;height:14px;
      background:#2266cc;border:2.5px solid #fff;
      border-radius:50%;
      box-shadow:0 0 0 2px #2266cc;
    "></div>`,
    iconSize: [14, 14],
    iconAnchor: [7, 7],
    popupAnchor: [0, -10]
  });

  const trailheadIcon = L.divIcon({
    className: '',
    html: `<div style="
      width:14px;height:14px;
      background:#27a85f;border:2.5px solid #fff;
      border-radius:3px;
      box-shadow:0 0 0 2px #27a85f;
    "></div>`,
    iconSize: [14, 14],
    iconAnchor: [7, 7],
    popupAnchor: [0, -10]
  });

  // --- Markers ---
  L.marker([lat, lon], {icon: summitIcon})
    .addTo(map)
    .bindPopup(`<strong>${name}</strong><br>${elev} m a.s.l.<br>${lat.toFixed(5)}°N, ${lon.toFixed(5)}°E`)
    .openPopup();

  L.marker([HOME_LAT, HOME_LON], {icon: homeIcon})
    .addTo(map)
    .bindPopup(`<strong>${HOME_NAME}</strong><br>47.2050°N, 8.8381°E`);

  if (hasTrailhead) {
    const popupText = tDesc
      ? `<strong>${tName || 'Trailhead'}</strong><br><span style="font-size:11px">${tDesc}</span>`
      : `<strong>${tName || 'Trailhead'}</strong>`;
    L.marker([tLat, tLon], {icon: trailheadIcon})
      .addTo(map)
      .bindPopup(popupText);
  }

  // --- Red dashed line: Richterswil → Summit (air distance) ---
  L.polyline([[lat, lon], [HOME_LAT, HOME_LON]], {
    color: '#e03030',
    weight: 2.5,
    dashArray: '6 5',
    opacity: 0.85
  }).addTo(map);

  // --- Green dotted line: Trailhead → Summit ---
  if (hasTrailhead) {
    L.polyline([[tLat, tLon], [lat, lon]], {
      color: '#27a85f',
      weight: 2,
      dashArray: '4 4',
      opacity: 0.8
    }).addTo(map);
  }

  // --- Legend ---
  const legend = L.control({position: 'bottomright'});
  legend.onAdd = () => {
    const div = L.DomUtil.create('div', 'legend');
    let html = `
      <div><span class="legend-dot" style="background:#e03030"></span> ${name} (summit)</div>
      <div><span class="legend-dot" style="background:#2266cc"></span> ${HOME_NAME}</div>
      <div><span class="legend-line"></span> Air distance: ${dist} km</div>
    `;
    if (hasTrailhead) {
      html += `<div><span class="legend-dot" style="background:#27a85f;border-radius:3px"></span> ${tName || 'Trailhead'}</div>`;
    }
    if (hasDrive) {
      html += `<div><span class="legend-line blue"></span> Drive: ${driveKm} km</div>`;
    }
    div.innerHTML = html;
    return div;
  };
  legend.addTo(map);

  // --- Fetch driving route from OSRM and draw thick blue line ---
  if (hasDrive) {
    const osrmUrl =
      `https://router.project-osrm.org/route/v1/driving/` +
      `${HOME_LON},${HOME_LAT};${tLon},${tLat}` +
      `?overview=full&geometries=geojson`;

    fetch(osrmUrl)
      .then(r => r.json())
      .then(data => {
        if (data.code !== 'Ok' || !data.routes.length) return;
        const coords = data.routes[0].geometry.coordinates;
        // OSRM returns [lon, lat] — Leaflet needs [lat, lon]
        const latLngs = coords.map(c => [c[1], c[0]]);
        L.polyline(latLngs, {
          color: '#2266cc',
          weight: 5,
          opacity: 0.85
        }).addTo(map);
      })
      .catch(() => {/* silently ignore if OSRM unavailable */});
  }
</script>

</body>
</html>
